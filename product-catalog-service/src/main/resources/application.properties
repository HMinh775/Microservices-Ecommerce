server.port=8810
spring.application.name=product-catalog-service

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# MySQL XAMPP
# Nhớ tạo database tên 'product_db' trong phpMyAdmin nhé
spring.datasource.url=jdbc:mysql://localhost:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Thư mục lưu ảnh sản phẩm
upload.path=D:/Microservices/e-commerce-microservices-master/product-catalog-service/media-storage/products/
# Serve ảnh tĩnh qua URL: /media/filename.jpg (Cấu hình song song với Controller)
spring.web.resources.static-locations=file:D:/Microservices/e-commerce-microservices-master/product-catalog-service/media-storage/products/
spring.mvc.static-path-pattern=/media/**
# Multipart Config (Fix 413 Request Entity Too Large)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB