# Server port
server.port=8900

# Application name
spring.application.name=api-gateway

# Eureka Client registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# SPRING CLOUD GATEWAY ROUTES (Thay thế cho Zuul)
# ----------------------------------
# Tự động map path theo tên service trên Eureka (nếu muốn dùng nhanh)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Loại bỏ header CORS bị trùng từ các microservices
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# Định nghĩa các Route cụ thể
# User service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Catalog service
spring.cloud.gateway.routes[1].id=product-catalog-service
spring.cloud.gateway.routes[1].uri=lb://product-catalog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/product-catalog-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Order service
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/order-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Payment service
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment-service/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# Recommendation service
spring.cloud.gateway.routes[4].id=product-recommendation-service
spring.cloud.gateway.routes[4].uri=lb://product-recommendation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/product-recommendation-service/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

# SPRING SESSION & REDIS PROPERTIES
# DISABLE Redis nếu không chạy để tránh lỗi 503
# spring.session.store-type=redis
# spring.session.redis.namespace=session
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Logging
logging.level.root=WARN
logging.level.org.springframework.cloud.gateway=INFO