# Server port
server.port=8813

# Application name
spring.application.name=order-service

# Client registration properties
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Data source (MySQL - XAMPP)
# Lưu ý: Thay 'orders' bằng tên Database bạn đã tạo trong phpMyAdmin
spring.datasource.url=jdbc:mysql://localhost:3306/orders_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Dialect cho MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Redis & Session (DISABLE để tránh lỗi 503 nếu Redis không chạy)
# spring.session.store-type=redis
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Logging
logging.level.root=WARN
logging.level.com.rainbowforest=INFO
logging.level.org.springframework.web=INFO