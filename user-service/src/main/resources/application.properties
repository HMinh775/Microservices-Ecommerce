##### Service details #####
server.port=8811
spring.application.name=user-service

# Client registration properties
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Data source (MySQL XAMPP)
# Nhớ tạo DB 'user_db' trong phpMyAdmin nhé Minh
spring.datasource.url=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

##### HTTP #####
error.404.schema.details=The resource you are looking for might have been removed...
error.406.schema.details=This request is not acceptable...

