# Server port
server.port=8812

# Application name
spring.application.name=product-recommendation-service

# Client registration properties
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Data source (MySQL XAMPP)
# Tự động tạo DB nếu chưa có: recommendation_db
spring.datasource.url=jdbc:mysql://localhost:3306/recommendation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate
spring.jpa.show-sql=true
# Dùng Dialect của MySQL thay cho SQL Server
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update